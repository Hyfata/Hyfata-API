<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이메일 인증 확인 (Email Verification)</title>
    <style>
        body {
            font-family: 'Malgun Gothic', 'Arial', sans-serif;
            text-align: center;
            padding: 50px;
            background-color: #f4f7f6;
        }
        .container {
            background-color: #ffffff;
            border: 1px solid #e0e0e0;
            padding: 40px;
            max-width: 450px;
            margin: 0 auto;
            border-radius: 10px;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
        }
        h2 {
            color: #333;
            margin-bottom: 10px;
        }
        .status-icon {
            font-size: 50px;
            margin-bottom: 20px;
            display: block;
        }
        .success-icon { color: #28a745; }
        .error-icon { color: #dc3545; }
        .loading-icon { color: #007bff; animation: spin 1.5s linear infinite; }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        #statusMessage {
            margin-bottom: 25px;
            font-size: 16px;
        }
        
        #loginLink {
            display: inline-block;
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        
        #loginLink:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="container">
        <span id="statusIcon" class="status-icon loading-icon">🔄</span>
        <h2 id="statusTitle">인증 확인 중...</h2>
        <p id="statusMessage">이메일 인증 토큰을 처리하고 있습니다. 잠시만 기다려 주세요.</p>
        <a href="#" id="loginLink">로그인 페이지로 이동</a>
    </div>

    <script>
        // --- 1. Element References ---
        const statusIcon = document.getElementById('statusIcon');
        const titleElement = document.getElementById('statusTitle');
        const messageElement = document.getElementById('statusMessage');
        const loginLink = document.getElementById('loginLink');

        // --- 2. Core Verification Function ---
        async function verifyEmail() {
            // Get the token from the URL query parameters
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token'); 

            if (!token) {
                // Handle missing token immediately
                statusIcon.textContent = '❌';
                statusIcon.classList.remove('loading-icon');
                statusIcon.classList.add('error-icon');
                titleElement.textContent = "오류: 토큰 없음";
                messageElement.textContent = "인증 토큰을 찾을 수 없습니다. 올바른 링크를 사용했는지 확인해 주세요.";
                loginLink.textContent = "홈 페이지로 이동";
                loginLink.href = "/"; // Link to homepage or resend link
                return;
            }

            // Start API request
            const apiUrl = `https://api.hyfata.kr/api/auth/verify-email?token=${token}`;

            try {
                // Fetch request to the external API
                const response = await fetch(apiUrl);
                
                // Check if the HTTP status code indicates success (e.g., 200-299)
                if (response.ok) {
                    // Success State
                    statusIcon.textContent = '✅';
                    statusIcon.classList.remove('loading-icon');
                    statusIcon.classList.add('success-icon');
                    // Requested Korean success message:
                    titleElement.textContent = "이메일 인증이 완료되었습니다."; 
                    messageElement.textContent = "이제 로그인 페이지로 이동하여 서비스를 이용하실 수 있습니다.";
                    loginLink.textContent = "로그인 페이지로 이동";
                    loginLink.href = "/login"; // Placeholder for the actual login URL

                } else {
                    // Failure State (Server returned a non-200 status code)
                    statusIcon.textContent = '⚠️';
                    statusIcon.classList.remove('loading-icon');
                    statusIcon.classList.add('error-icon');
                    titleElement.textContent = "인증 실패";
                    // You might read the specific error message from 'response.json()' here
                    messageElement.textContent = `유효하지 않거나 만료된 토큰입니다. (Status: ${response.status})`;
                    loginLink.textContent = "인증 이메일 재전송 요청";
                    loginLink.href = "/resend-verification"; // Placeholder for resend URL
                }
            } catch (error) {
                // Network or CORS Error State
                console.error("Verification failed:", error);
                statusIcon.textContent = '🛑';
                statusIcon.classList.remove('loading-icon');
                statusIcon.classList.add('error-icon');
                titleElement.textContent = "네트워크 연결 오류";
                messageElement.textContent = "서버에 연결할 수 없습니다. 잠시 후 다시 시도해 주세요.";
                loginLink.textContent = "홈 페이지로 이동";
                loginLink.href = "/";
            }
        }

        // --- 3. Execute the function on page load ---
        verifyEmail();
    </script>

</body>
</html>
