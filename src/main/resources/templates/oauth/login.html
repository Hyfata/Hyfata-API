<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - Hyfata</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #001F29;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: white;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
            padding: 40px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 8px;
        }

        .login-header p {
            font-size: 14px;
            color: #666;
        }

        .client-info {
            background: #f8f9fa;
            border-left: 4px solid #00bcd4;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 24px;
            font-size: 13px;
            color: #555;
        }

        .client-info strong {
            color: #333;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #333;
            margin-bottom: 6px;
        }

        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="email"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #00bcd4;
            box-shadow: 0 0 0 3px rgba(0, 188, 212, 0.1);
        }

        input.error {
            border-color: #c33;
            box-shadow: 0 0 0 3px rgba(204, 51, 51, 0.1);
        }

        .form-group input[type="hidden"] {
            display: none;
        }

        .field-error {
            color: #c33;
            font-size: 12px;
            margin-top: 6px;
            display: none;
        }

        .field-error.visible {
            display: block;
        }

        .submit-btn {
            background: #00bcd4;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 8px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 188, 212, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 14px;
            border-left: 4px solid #c33;
        }

        .register-link {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .register-link p {
            font-size: 14px;
            color: #666;
            margin-bottom: 12px;
        }

        .register-btn {
            display: inline-block;
            background: transparent;
            color: #00bcd4;
            border: 2px solid #00bcd4;
            padding: 10px 24px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s;
        }

        .register-btn:hover {
            background: #00bcd4;
            color: white;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>Hyfata</h1>
            <p>계속하려면 로그인하세요</p>
        </div>

        <!-- 클라이언트 정보 표시 -->
        <div class="client-info">
            <strong>연결 대상:</strong><br>
            <span th:text="${client_name}"></span>
        </div>

        <!-- 에러 메시지 -->
        <div th:if="${error}" id="server-error" class="error-message" th:text="${error}"></div>
        <div id="client-error" class="error-message" style="display: none;"></div>

        <!-- 로그인 폼 -->
        <form id="loginForm" method="POST" action="/oauth/login" novalidate>
            <input type="hidden" name="client_id" th:value="${client_id}">
            <input type="hidden" name="redirect_uri" th:value="${redirect_uri}">
            <input type="hidden" name="state" th:value="${state}">
            <input type="hidden" name="code_challenge" th:value="${code_challenge}">
            <input type="hidden" name="code_challenge_method" th:value="${code_challenge_method}">

            <div class="form-group">
                <label for="email">이메일</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    th:value="${email}"
                    autofocus
                    placeholder="user@example.com"
                >
                <div id="email-error" class="field-error">이메일을 입력해 주세요.</div>
            </div>

            <div class="form-group">
                <label for="password">비밀번호</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="비밀번호를 입력하세요"
                >
                <div id="password-error" class="field-error">비밀번호를 입력해 주세요.</div>
            </div>

            <button type="submit" class="submit-btn">로그인</button>
        </form>

        <!-- 비밀번호 찾기 링크 -->
        <div class="register-link" style="border-top: 1px solid #eee; margin-top: 16px; padding-top: 16px;">
            <p style="font-size: 13px; margin-bottom: 8px;">
                <a th:href="@{/oauth/forgot-password(client_id=${client_id}, redirect_uri=${redirect_uri}, state=${state}, code_challenge=${code_challenge}, code_challenge_method=${code_challenge_method})}" style="color: #666; text-decoration: underline;">비밀번호를 잊으셨나요?</a>
            </p>
        </div>

        <!-- 회원가입 링크 -->
        <div class="register-link">
            <p>계정이 없으신가요?</p>
            <a th:href="@{/oauth/register(client_id=${client_id}, redirect_uri=${redirect_uri}, state=${state}, code_challenge=${code_challenge}, code_challenge_method=${code_challenge_method})}" class="register-btn">회원가입</a>
        </div>
    </div>

    <script>
        (function() {
            const form = document.getElementById('loginForm');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const clientError = document.getElementById('client-error');
            const emailError = document.getElementById('email-error');
            const passwordError = document.getElementById('password-error');

            function clearErrors() {
                clientError.style.display = 'none';
                clientError.textContent = '';
                emailError.classList.remove('visible');
                passwordError.classList.remove('visible');
                emailInput.classList.remove('error');
                passwordInput.classList.remove('error');
            }

            function showFieldError(input, errorEl, message) {
                input.classList.add('error');
                errorEl.textContent = message;
                errorEl.classList.add('visible');
            }

            form.addEventListener('submit', function(e) {
                clearErrors();
                let hasError = false;

                const email = emailInput.value.trim();
                const password = passwordInput.value;

                if (!email) {
                    showFieldError(emailInput, emailError, '이메일을 입력해 주세요.');
                    hasError = true;
                } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                    showFieldError(emailInput, emailError, '올바른 이메일 형식을 입력해 주세요.');
                    hasError = true;
                }

                if (!password) {
                    showFieldError(passwordInput, passwordError, '비밀번호를 입력해 주세요.');
                    hasError = true;
                }

                if (hasError) {
                    e.preventDefault();
                }
            });

            emailInput.addEventListener('input', function() {
                emailInput.classList.remove('error');
                emailError.classList.remove('visible');
            });

            passwordInput.addEventListener('input', function() {
                passwordInput.classList.remove('error');
                passwordError.classList.remove('visible');
            });
        })();
    </script>
</body>
</html>
